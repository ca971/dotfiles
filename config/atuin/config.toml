# ============================================================================
# @file        config.toml
# @description Atuin configuration — Power User setup.
# @repository  https://github.com/ca971/dotfiles.git
# @author      ca971
# ============================================================================

# ── Core (TOP-LEVEL) ─────────────────────────────────────────────────────────
dialect = "us"
timezone = "local"
style = "auto"
inline_height = 40
show_preview = true
max_preview_height = 4
invert = false
show_help = true
show_tabs = true

# ── Cursor (TOP-LEVEL) ───────────────────────────────────────────────────────
keymap_cursor = { emacs = "blink-bar", vim_insert = "blink-bar", vim_normal = "steady-block" }

# ── Search & Filter (TOP-LEVEL) ──────────────────────────────────────────────
search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "global"
search_mode_shell_up_key_binding = "fuzzy"

# ── Behavior (TOP-LEVEL) ─────────────────────────────────────────────────────
enter_accept = true
command_chaining = true
exit_mode = "return-query"
keymap_mode = "auto"
word_jump_mode = "emacs"
secrets_filter = true

# ── Sync (TOP-LEVEL) ─────────────────────────────────────────────────────────
auto_sync = true
sync_frequency = "5m"

# ── Network / DB (TOP-LEVEL) ─────────────────────────────────────────────────
network_connect_timeout = 5
network_timeout = 5
local_timeout = 5

# ── Noise Reduction (TOP-LEVEL) ──────────────────────────────────────────────
# fmt: off
history_filter = [
  "^\\s*$",
  "^(ls|ll|la|l|eza|lsd|tree|broot)\\s*$",
  "^(cd|z|zi|zoxide)\\s.*$",
  "^(clear|cls|reset)$",
  "^(exit|logout|q)$",
  "^(pwd|hostname|date|whoami|uname|uptime|fastfetch)$",
  "^(htop|btop|top|btm)$",
  "^(lazygit|lazydocker|gitui|tig)$",
  "^(k9s|lnav|visidata)$",
  "^(bat|cat|less|more|most)\\s.*$",
]
# fmt: on

# ── Theme (SECTION) ──────────────────────────────────────────────────────────
# IMPORTANT: [theme] doit être la DERNIÈRE section avant les autres sections
# car en TOML, tout ce qui suit [theme] jusqu'à la prochaine section
# appartient à [theme].
[theme]
name = "marine"

# ── UI Layout (SECTION) ──────────────────────────────────────────────────────
[ui]
# fmt: off
columns = [
  { type = "exit", width = 3 },
  { type = "duration", width = 5 },
  { type = "time", width = 8 },
  { type = "directory", width = 20 },
  { type = "command", expand = true },
]
# fmt: on

# ── Search filters (SECTION) ─────────────────────────────────────────────────
[search]
filters = [
  "global",
  "host",
  "session",
  "session-preload",
  "workspace",
  "directory",
]

