# ── Sync Engine (SECTION) ────────────────────────────────────────────────────
[sync]
records = true

# ── Preview (SECTION) ────────────────────────────────────────────────────────
[preview]
strategy = "auto"

# ── Keys (SECTION) ───────────────────────────────────────────────────────────
[keys]
scroll_exits = false
exit_past_line_start = true
accept_past_line_end = true

# ── Tmux (SECTION) ───────────────────────────────────────────────────────────
[tmux]
enabled = false
