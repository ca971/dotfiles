# ── Sync Engine ─────────────────────────────────────────────────────────────
[sync]
records = true # Enable sync v2

# ── Preview ─────────────────────────────────────────────────────────────────
[preview]
strategy = "auto" # Adjust preview height dynamically

# ── Network / DB ────────────────────────────────────────────────────────────
network_connect_timeout = 5
network_timeout = 5
local_timeout = 5

# ── Keys ────────────────────────────────────────────────────────────────────
[keys]
scroll_exits = false        # Prevent accidental exit when scrolling past edges
exit_past_line_start = true
accept_past_line_end = true

# ── Tmux (disabled by default, enable if tmux >= 3.2) ──────────────────────
[tmux]
enabled = false
# width = "80%"
# height = "60%"
