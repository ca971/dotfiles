  "docker-compose",
  "doctl",
  "doggo",
  "dive",
  "dnf",
  "dotnet",
  "eza",
  "fd",
  "ffmpeg",
  "gh",
  "git",
  "go",
  "gpg",
  "gum",
  "helm",
  "jj",
  "jq",
  "just",
  "k9s",
  "kubectl",
  "kubectx",
  "mise",
  "nix",
