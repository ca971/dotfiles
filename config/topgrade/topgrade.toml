# ============================================================================
# Topgrade Configuration
# @file    config/topgrade/topgrade.toml
# @author  ca971
# @see     https://github.com/topgrade-rs/topgrade/wiki/Configuration
# @version 2.0.0
#
# Structure:
#   1. Global Behavior
#   2. Lifecycle Hooks  (pre / post)
#   3. Custom Steps
#   4. Package Managers
#   5. Runtime Managers
#   6. Editors & Plugins
#   7. Shell & Terminal
#   8. Version Control
#   9. Containers & Virtualization
#  10. Platform-specific (macOS / Linux / Windows)
#  11. Misc Tools
#
# Additional configs in topgrade.d/ are auto-included.
# ============================================================================


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 1. GLOBAL BEHAVIOR                                                      │
# └─────────────────────────────────────────────────────────────────────────┘
[misc]
# Do not assume yes for all prompts
assume_yes = false

# Perform cleanup of temporary files and caches
cleanup = true

# Do not self-update topgrade (managed externally via brew/cargo)
no_self_update = true

# Display the execution time for each step
display_time = true

# Do not retry failed steps
no_retry = true

# Do not send system notifications at the end of a run
skip_notify = false

# Do not run sudo at the start
pre_sudo = false

# Globally disabled steps
# helm → managed manually (critical clusters, never auto-updated)
disable = ["helm"]

# Steps whose failures are non-blocking (tolerated)
# ignore_failures = [
#   "containers",
#   "pip3",
# ]

# Run topgrade inside a tmux session (useful for long-running updates)
# run_in_tmux = true


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 2. LIFECYCLE HOOKS                                                      │
# └─────────────────────────────────────────────────────────────────────────┘

# -- Pre-run: preparations before any upgrade --------------------------------
[pre_commands]
# Sync dotfiles before upgrading anything
"00 - Dotfiles sync" = """
  cd ~/dotfiles \
    && git fetch --prune \
    && git pull --rebase --autostash 2>/dev/null \
    && echo '✓ dotfiles up-to-date'
"""

# -- Post-run: regenerations & syncs after all upgrades ---------------------
[post_commands]
# Regenerate SSOT (Single Source Of Truth) files from dotfiles
"99 - SSOT regenerate" = """
  cd ~/dotfiles \
    && bash ssot/generators/generate-all.sh 2>/dev/null \
    && echo '✓ SSOT regenerated'
"""


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 3. CUSTOM STEPS                                                         │
# │    Explicit numbering enforces execution order                          │
# └─────────────────────────────────────────────────────────────────────────┘
[commands]
# Zinit: parallel update of all zsh plugins
"01 - Zinit plugins" = "zsh -ic 'zinit update --all --parallel'"

# Mise: upgrade all managed runtimes (node, python, ruby, go, …)
"02 - Mise Runtimes" = "mise upgrade -y && mise prune -y"

# Sync Neovim plugins using Lazy.nvim in headless mode
"03 - Neovim Plugins" = "nvim --headless '+Lazy! sync' +qa"

# Bat: rebuild syntax/theme cache after adding new themes or languages
"04 - Bat Cache" = "bat cache --build"

# TLDR: refresh local page cache
"05 - TLDR cache" = "tldr --update"

# Atuin: sync encrypted shell history
"06 - Atuin sync" = "atuin sync"

# Cargo: update all binaries installed via cargo-update
"07 - Cargo binaries" = "cargo install-update --all"

# Pipx: upgrade all isolated Python tools
"08 - Pipx packages" = "pipx upgrade-all"

# Homebrew: remove cached versions older than 7 days
"09 - Brew cleanup" = "brew cleanup --prune=7"

# MAS: upgrade Mac App Store apps from the CLI
"10 - MAS updates" = "mas upgrade"


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 4. PACKAGE MANAGERS                                                     │
# └─────────────────────────────────────────────────────────────────────────┘

[brew]
# Update casks even when they self-report as up-to-date
greedy_cask = true

# Automatically remove dependencies that are no longer needed
autoremove = true

# Clean up cached downloads and old versions
cleanup = true

[npm]
# Use sudo when the npm prefix directory is not owned by the current user
# use_sudo = true

[yarn]
# use_sudo = true

[composer]
# self_update = true

[pip3]
# Enable pip-review to list and upgrade global Python packages
# enable_pip_review       = true
# enable_pip_review_local = true

[python]
# Prefer pipx + mise over global pip upgrades — disabled by default
# enable_pip_review        = true
# enable_pip_review_local  = true
# enable_pipupgrade        = true
# pipupgrade_arguments     = "-y -u --pip-path pip"

[conda]
# Named conda environments to update
# env_names = ["base", "ml", "datascience"]
# Conda environments to update by path
# env_paths = ["~/projects/ml/.conda/"]

[pixi]
# Show release notes of the latest pixi release during the pixi step
# include_release_notes = false

[deno]
# Pin a specific deno version to upgrade to
# version = "stable"


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 5. RUNTIME MANAGERS                                                     │
# └─────────────────────────────────────────────────────────────────────────┘

[mise]
# Set to true to automatically update version numbers in mise.toml
bump = false

# Number of simultaneous download/install jobs
jobs = 8

# Prompt for confirmation per runtime (default: false)
# interactive = false

[rustup]
# Restrict updates to specific channels — avoids downloading unused nightly
# channels = ["stable", "beta"]

[zigup]
# Zig versions to maintain (pinned releases or branches)
# target_versions = ["master", "0.13.0"]
# Directory where zig toolchains are installed
# install_dir     = "~/.local/zig"
# Symlink pointing to the default zig compiler
# path_link       = "~/.local/bin/zig"
# Run `zigup clean` after updating all versions (default: false)
# cleanup         = true


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 6. EDITORS & PLUGINS                                                    │
# └─────────────────────────────────────────────────────────────────────────┘

[vim]
# vim-plug: run `PlugUpdate!` instead of `PlugUpdate` to force reinstall
force_plug_update = true

[vscode]
# Target a specific VSCode profile for extension updates
# profile = "default"

[doom]
# Enable ahead-of-time native compilation during `doom upgrade` (CPU-heavy)
# aot = true


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 7. VERSION CONTROL                                                      │
# └─────────────────────────────────────────────────────────────────────────┘

[git]
# Maximum number of parallel git operations
max_concurrency = 5

# Additional repositories to keep in sync
# repos = [
#   "~/dev/*/",
#   "~/dotfiles",
#   "~/.config/nvim",
# ]

# Git arguments used when pulling (rebase + autostash is the safest strategy)
# arguments = "--rebase --autostash"

# Fetch only — skip merge/rebase entirely
# fetch_only = false

# Pull predefined repositories in the config
pull_predefined = true

[chezmoi]
# Exclude encrypted files from automatic updates (default: false)
# exclude_encrypted = true


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 8. CONTAINERS & VIRTUALISATION                                          │
# └─────────────────────────────────────────────────────────────────────────┘

[containers]
# Runtime to use (docker or podman)
runtime = "docker"

# Run `docker system prune` to remove unused resources after updates
system_prune = true

# Containers to ignore during updates (wildcard supported)
# ignored_containers = [
#   "ghcr.io/rancher-sandbox/*",
#   "docker.io/library/scratch*",
# ]

# Use sudo for non-rootless container installations (default: false)
# use_sudo = false

[distrobox]
# use_root   = false
# containers = ["archlinux-latest", "ubuntu-22.04"]

[vagrant]
# directories    = ["~/dev/vms/"]
# power_on       = true
# always_suspend = true


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 9. PLATFORM-SPECIFIC                                                    │
# └─────────────────────────────────────────────────────────────────────────┘

# -- macOS ------------------------------------------------------------------
# Homebrew configuration is handled in §4 — no additional macOS keys needed.

# -- Linux ------------------------------------------------------------------
[linux]
# Extra arguments forwarded to yay (AUR helper)
yaw_arguments = "--nodiffmenu"

[mandb]
# Update the man-page database (usually handled by a system timer)
# enable = true

[pkgfile]
# Update the pkgfile database (Arch only — expensive, disabled by default)
# enable = true

[flatpak]
# Use sudo for system-wide Flatpak updates
# use_sudo = true

[lensfun]
# Update Lensfun database system-wide (requires sudo); user-only otherwise
# use_sudo = true

# -- Windows ----------------------------------------------------------------
[windows]
# Manually review and select Windows updates before applying
# accept_all_updates = false

# Automatic reboot behavior when an update requires a restart
# "ask" is safer than "yes" in a professional environment
# updates_auto_reboot = "ask"   # allowed: "yes" | "no" | "ask"

# Open remote sessions in a new terminal window
# open_remotes_in_new_terminal = true

# Include WSL pre-release builds
# wsl_update_pre_release = true

# Use web download instead of the Windows Store for WSL updates
# wsl_update_use_web_download = true


# ┌─────────────────────────────────────────────────────────────────────────┐
# │ 10. MISC TOOLS                                                          │
# └─────────────────────────────────────────────────────────────────────────┘

[firmware]
# Set to true to actually perform the firmware upgrade
upgrade = true

[julia]
# Disable the startup file during updates to avoid stale `using` directives
# startup_file = false
