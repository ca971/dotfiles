# ============================================================================
# GPG Configuration — Security-hardened
# @file    config/gpg/gpg.conf
# @see     https://gnupg.org/documentation/manuals/gnupg/GPG-Configuration.html
# @see     https://github.com/drduh/YubiKey-Guide
# ============================================================================

# ── Default key (uncomment and set your key ID) ─────────────────────────────
# default-key 0xABCDEF1234567890

# ── Behavior ─────────────────────────────────────────────────────────────────
no-greeting
no-emit-version
no-comments
export-options export-minimal
charset utf-8
fixed-list-mode
keyid-format 0xlong
with-fingerprint
with-keygrip
list-options show-uid-validity
verify-options show-uid-validity

# ── Algorithm Preferences (modern, reject weak) ─────────────────────────────
personal-cipher-preferences AES256 AES192 AES
personal-digest-preferences SHA512 SHA384 SHA256
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed

# ── Cipher and digest defaults ───────────────────────────────────────────────
cert-digest-algo SHA512
s2k-cipher-algo AES256
s2k-digest-algo SHA512
s2k-mode 3
s2k-count 65011712

# ── Keyserver ────────────────────────────────────────────────────────────────
keyserver hkps://keys.openpgp.org
keyserver-options no-honor-keyserver-url
keyserver-options include-revoked
auto-key-locate keyserver
auto-key-retrieve

# ── Trust model ──────────────────────────────────────────────────────────────
trust-model tofu+pgp
tofu-default-policy unknown
