# ============================================================================
# GPG Agent Configuration
# @file    config/gpg/gpg-agent.conf
# ============================================================================

# ── Cache TTL (seconds) ─────────────────────────────────────────────────────
# Default cache: 10 minutes
default-cache-ttl 600

# Max cache: 2 hours
max-cache-ttl 7200

# SSH cache
default-cache-ttl-ssh 600
max-cache-ttl-ssh 7200

# ── Pinentry (passphrase prompt) ─────────────────────────────────────────────
# macOS
# pinentry-program /opt/homebrew/bin/pinentry-mac

# Linux (terminal)
# pinentry-program /usr/bin/pinentry-tty

# Linux (GUI)
# pinentry-program /usr/bin/pinentry-gnome3

# ── SSH Support (use GPG keys for SSH auth) ──────────────────────────────────
# Uncomment to enable GPG-based SSH authentication
# enable-ssh-support

# ── Logging ──────────────────────────────────────────────────────────────────
# log-file ~/.local/state/gnupg/gpg-agent.log
# debug-level basic
