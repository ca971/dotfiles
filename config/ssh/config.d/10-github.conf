# ============================================================================
# GitHub SSH — Multi-key with automatic fallback
# @file    config/ssh/config.d/10-github.conf
#
# Keys (in priority order):
#   1. id_github_ed25519   — Primary GitHub key
#   2. id_fallback_ed25519 — Fallback key
# ============================================================================

# ── GitHub — Auto-failover (tries keys in order) ────────────────────────────
Host github.com
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_github_ed25519
  IdentityFile ~/.ssh/id_fallback_ed25519
  IdentitiesOnly yes
  AddKeysToAgent yes
  PreferredAuthentications publickey

# ── GitHub — Force primary key ──────────────────────────────────────────────
Host github-primary
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_github_ed25519
  IdentitiesOnly yes

# ── GitHub — Force fallback key ─────────────────────────────────────────────
Host github-fallback
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_fallback_ed25519
  IdentitiesOnly yes
