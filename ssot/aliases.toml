# ============================================================================
# @file        ssot/aliases.toml
# @description Single Source of Truth for ALL aliases (generic + tools).
#              Each section declares its required binary via [section.meta].
#              The generator outputs conditional aliases that only load
#              if the required tool is installed.
#
#              Sections WITHOUT meta.binary are ALWAYS loaded (generic).
#              Sections WITH meta.binary are loaded ONLY if the binary exists.
#
# @format      [category]
#              meta.binary = "command"    # Required binary (optional)
#              meta.binary_alt = "alt"    # Alternative binary name (optional)
#              alias_name = "command"
#
# @repository  https://github.com/ca971/dotfiles.git
# @author      ca971
# @license     MIT
# @version     4.0.0
# ============================================================================

# ============================================================================
# GENERIC — Always loaded (no tool dependency)
# ============================================================================

[general]
c = "clear"
q = "exit"
reload = "exec ${SHELL} -l"
mkd = "mkdir -pv"
cx = "chmod +x"
now = "date '+%Y-%m-%dT%H:%M:%S%z'"
timestamp = "date '+%s'"

[navigation]
".." = "cd .."
"..." = "cd ../.."
"...." = "cd ../../.."
"....." = "cd ../../../.."
cdc = "cd ${XDG_CONFIG_HOME:-~/.config}"
cdp = "cd ~/Projects"
cdd = "cd ~/Downloads"
cdt = "cd ~/Desktop"
cdz = "cd ${DOTFILES_DIR:-~/dotfiles}"

[file_ops]
cp = "cp -iv"
mv = "mv -iv"
rm = "rm -iv"
rmf = "rm -rfv"
cpr = "cp -rv"
rcp = "rsync -avhP --info=progress2"

[system]
psg = "ps aux | grep -v grep | grep -i"
ports = "ss -tulpn"
connections = "ss -tupan"
myip = "curl -s https://ifconfig.me && echo ''"
weather = "curl -s 'wttr.in?format=3'"
cal3 = "cal -3"
topmem = "ps aux --sort=-%mem | head -20"
topcpu = "ps aux --sort=-%cpu | head -20"
usage = "df -h --total 2>/dev/null || df -h"

[network]
ping = "ping -c 5"
get = "curl -sSL"
headers = "curl -sSI"
dl = "curl -LO --progress-bar"

[archive]
tgz = "tar -czvf"
untgz = "tar -xzvf"
tbz = "tar -cjvf"
untbz = "tar -xjvf"
txz = "tar -cJvf"
untxz = "tar -xJvf"

[encoding]
urlencode = "python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))'"
urldecode = "python3 -c 'import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))'"
jsonpp = "python3 -m json.tool"
b64e = "base64"
b64d = "base64 --decode"
uuid = "python3 -c 'import uuid; print(uuid.uuid4())'"
genpass = "openssl rand -base64 32"

[misc]
dirsize = "du -sh . 2>/dev/null"

[dev]
dev = "cd $DEV_HOME"
proj = "cd $DEV_HOME/projects/personal"
work = "cd $DEV_HOME/projects/work"
lab = "cd $DEV_HOME/lab"
infra = "cd $DEV_HOME/infra"
dt = "cd $DEV_HOME/dotfiles"

# ============================================================================
# TOOL-SPECIFIC — Loaded ONLY if the tool is installed
# ============================================================================

[eza]
meta.binary = "eza"
ls = "eza --icons --group-directories-first --color=always"
l = "eza --icons=auto --group-directories-first --color=auto"
ll = "eza --icons=auto --group-directories-first --color=auto -l --git --header --time-style=relative"
la = "eza --icons=auto --group-directories-first --color=auto -la --git --header --time-style=relative"
lw = "eza --icons=auto --group-directories-first --color=auto --across"
lt = "eza --icons=auto --group-directories-first --color=auto --tree --level=1 --git-ignore"
lt2 = "eza --icons=auto --group-directories-first --color=auto --tree --level=2 --git-ignore"
lt3 = "eza --icons=auto --group-directories-first --color=auto --tree --level=3 --git-ignore"
lts = "eza --icons=auto --group-directories-first --color=auto --tree --level=2 --git-ignore -l --total-size --no-permissions --no-user --no-time"
ld = "eza --icons=auto --color=auto -lD"
lf = "eza --icons=auto --color=auto -lf --git --header --time-style=relative"
ldot = "eza --icons=auto --color=auto -la --git --header --time-style=relative -d .*"
lm = "eza --icons=auto --group-directories-first --color=auto -l --sort=modified --reverse --git --time-style=relative"
lc = "eza --icons=auto --group-directories-first --color=auto -l --sort=created --reverse --git --time-style=relative"
lS = "eza --icons=auto --group-directories-first --color=auto -l --sort=size --reverse --total-size"
lx = "eza --icons=auto --group-directories-first --color=auto -l --sort=extension --git --header"
l1 = "eza --icons=never --group-directories-first --color=never -1"
lr = "eza --icons=auto --color=auto -l --recurse --git --time-style=relative --git-ignore"
lX = "eza --icons=auto --color=auto -la@ --header"
lnk = "eza --icons=auto --color=auto -la --header --time-style=relative | rg '\\->'"

[bat]
meta.binary = "bat"
meta.binary_alt = "batcat"
cat = "bat --style=auto"
catn = "bat --style=numbers"
catp = "bat --plain"
catd = "bat --diff"
catj = "bat --language=json"
caty = "bat --language=yaml"
catm = "bat --language=markdown"

[fd]
meta.binary = "fd"
meta.binary_alt = "fdfind"
f = "fd --hidden --follow"
fd-dir = "fd --type d --hidden --follow"
fd-file = "fd --type f --hidden --follow"

[ripgrep]
meta.binary = "rg"
rgs = "rg --smart-case --hidden --follow --glob '!.git' --glob '!node_modules'"
rgc = "rg --smart-case --hidden --follow --glob '!.git' -C 3"
rgf = "rg --smart-case --hidden --follow --glob '!.git' --files-with-matches"

[git]
meta.binary = "git"
gs = "git status --short --branch"
gst = "git status"
ga = "git add --all"
gap = "git add --patch"
gc = "git commit -m"
gcs = "git commit -s -m"
gca = "git commit --amend --no-edit"
gp = "git push"
gpf = "git push --force-with-lease"
gpl = "git pull --rebase"
gfa = "git fetch --all --prune --tags"
glog = "git log --oneline --graph --decorate --all"
glg = "git log --graph --pretty=format:'%C(auto)%h%d %s %C(dim)(%ar) %C(blue)<%an>%Creset' --all"
gd = "git diff"
gds = "git diff --staged"
gb = "git branch -vv"
gba = "git branch -avv"
gco = "git checkout"
gcb = "git checkout -b"
gsw = "git switch"
gswc = "git switch -c"
gsta = "git stash push -m"
gstp = "git stash pop"
gstl = "git stash list"
grsh = "git reset --soft HEAD~1"
grhh = "git reset --hard HEAD"
grm = "git remote -v"
gtl = "git tag -l --sort=-v:refname"
gwt = "git worktree list"

[docker]
meta.binary = "docker"
meta.binary_alt = "podman"
dk = "docker"
dkc = "docker compose"
dkcu = "docker compose up -d"
dkcd = "docker compose down"
dkcl = "docker compose logs -f"
dkcr = "docker compose restart"
dkcb = "docker compose build --no-cache"
dkv = "docker volume ls"
dkn = "docker network ls"
dkprune = "docker system prune -af --volumes"

[kubernetes]
meta.binary = "kubectl"
k = "kubectl"
kx = "kubectl exec -it"
kl = "kubectl logs --tail=100"
klf = "kubectl logs -f --tail=200"
kd = "kubectl describe"
krm = "kubectl delete"
kga = "kubectl get all"
kgp = "kubectl get pods"
kgpw = "kubectl get pods -o wide"
kgs = "kubectl get svc"
kgd = "kubectl get deploy"
kgn = "kubectl get nodes -o wide"
kgns = "kubectl get ns"
ka = "kubectl apply -f"
kdel = "kubectl delete -f"
kpf = "kubectl port-forward"
ktop = "kubectl top pods"
ktopn = "kubectl top nodes"

[neovim]
meta.binary = "nvim"
v = "nvim"
vi = "nvim"
vim = "nvim"
vd = "nvim -d"
vr = "nvim -R"
vn = "nvim --clean"

[dust]
meta.binary = "dust"
du = "dust"
dus = "dust -s"
dut = "dust -d 1"

[duf]
meta.binary = "duf"
df = "duf"

[btop]
meta.binary = "btop"
top = "btop"
htop = "btop"

[tldr]
meta.binary = "tldr"
h = "tldr"
tldrl = "tldr --list"
tldru = "tldr --update"

[navi]
meta.binary = "navi"
cheat = "navi"

[fastfetch]
meta.binary = "fastfetch"
sysinfo = "fastfetch"
sysinfo-short = "fastfetch --structure Title:OS:Host:Kernel:Uptime:Shell:Terminal:CPU:GPU:Memory"

[gh]
meta.binary = "gh"
ghh = "gh"
ghpr = "gh pr create"
ghprv = "gh pr view --web"
ghprl = "gh pr list"
ghi = "gh issue create"
ghil = "gh issue list"
ghrepo = "gh repo view --web"
ghclone = "gh repo clone"

[just]
meta.binary = "just"
j = "just"
jl = "just --list"
jlu = "just --list --unsorted"
js = "just --show"
jd = "just --dry-run"

[topgrade]
meta.binary = "topgrade"
upgrade = "topgrade"
upgrade-yes = "topgrade --yes"
upgrade-dry = "topgrade --dry-run"
upgrade-clean = "topgrade --cleanup"

[thefuck]
meta.binary = "thefuck"
please = "fuck"
fix = "fuck"
oops = "fuck"

[lazygit]
meta.binary = "lazygit"
lg = "lazygit"

[lazydocker]
meta.binary = "lazydocker"
ldk = "lazydocker"
ldocker = "lazydocker"

[chezmoi]
meta.binary = "chezmoi"
cm = "chezmoi"
cma = "chezmoi apply -v"
cmd = "chezmoi diff"
cme = "chezmoi edit"
cmad = "chezmoi add"
cmcd = "chezmoi cd"
