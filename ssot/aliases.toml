zj = "zellij"
zja = "zellij attach"
zjl = "zellij list-sessions"

[k9s]
meta.binary = "k9s"
k9 = "k9s"
k9a = "k9s --all-namespaces"

[dive]
meta.binary = "dive"
dive-ci = "dive --ci"

[curlie]
meta.binary = "curlie"
curl = "curlie"

[bandwhich]
meta.binary = "bandwhich"
