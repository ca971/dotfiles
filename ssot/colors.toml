# ============================================================================
# @file        ssot/colors.toml
# @description Single Source of Truth for color definitions. Provides a
#              unified color palette used across the shell, prompt, syntax
#              highlighting, FZF, and all CLI tool configurations.
#              Supports multiple theme variants.
# @repository  https://github.com/ca971/zsh-config.git
# @author      ca971
# @license     MIT
# @created     2025-07-14
# @version     1.0.0
#
# @format      Colors are defined as hex RGB values (#RRGGBB).
#              The generator converts them to the appropriate format
#              per target: ANSI codes, zsh %F{}, fish set_color, etc.
# ============================================================================

# ============================================================================
# [ansi] — Standard ANSI color names mapped to theme-specific hex values
# ============================================================================
[ansi]

# @description  ANSI black / background dark
black = "#1e1e2e"

# @description  ANSI red
red = "#f38ba8"

# @description  ANSI green
green = "#a6e3a1"

# @description  ANSI yellow
yellow = "#f9e2af"

# @description  ANSI blue
blue = "#89b4fa"

# @description  ANSI magenta / purple
magenta = "#cba6f7"

# @description  ANSI cyan / teal
cyan = "#94e2d5"

# @description  ANSI white / foreground light
white = "#cdd6f4"

# @description  ANSI bright black / gray
bright_black = "#585b70"

# @description  ANSI bright red
bright_red = "#f38ba8"

# @description  ANSI bright green
bright_green = "#a6e3a1"

# @description  ANSI bright yellow
bright_yellow = "#f9e2af"

# @description  ANSI bright blue
bright_blue = "#89b4fa"

# @description  ANSI bright magenta
bright_magenta = "#cba6f7"

# @description  ANSI bright cyan
bright_cyan = "#94e2d5"

# @description  ANSI bright white
bright_white = "#cdd6f4"

