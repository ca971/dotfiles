# ============================================================================
# [semantic] — Semantic color roles (theme-independent)
# ============================================================================
[semantic]

# @description  Success / positive state
success = "#a6e3a1"

# @description  Warning / caution state
warning = "#f9e2af"

# @description  Error / danger state
error = "#f38ba8"

# @description  Informational / neutral state
info = "#89b4fa"

# @description  Debug / verbose state
debug = "#94e2d5"

# @description  Muted / disabled / placeholder
muted = "#6c7086"

# @description  Accent / highlight / emphasis
accent = "#cba6f7"

# @description  Primary foreground text
foreground = "#cdd6f4"

# @description  Primary background
background = "#1e1e2e"

# @description  Secondary background (elevated surfaces)
surface = "#313244"

# @description  Border / separator color
border = "#45475a"

# ============================================================================
# [ls_colors] — LS_COLORS generation hints
# ============================================================================
[ls_colors]

# @description  Directory color
directory = "#89b4fa"

# @description  Symbolic link color
symlink = "#94e2d5"

# @description  Executable file color
executable = "#a6e3a1"

# @description  Archive / compressed file color
archive = "#fab387"

# @description  Image / media file color
media = "#cba6f7"

# @description  Document file color
document = "#f9e2af"

# @description  Broken symlink color
broken_symlink = "#f38ba8"

# @description  Socket / pipe color
socket = "#f5c2e7"
