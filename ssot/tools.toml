# ============================================================================
# @file        ssot/tools.toml
# @description Single Source of Truth for CLI tool registry. Defines which
#              tools are expected, their installation methods, feature flags,
#              and categorization. Used by the doctor script, installer, and
#              tool-check library.
# @repository  https://github.com/ca971/zsh-config.git
# @author      ca971
# @license     MIT
# @created     2025-07-14
# @version     1.0.0
#
# @format      [tools.TOOL_NAME]
#              description = "..."
#              category = "essential" | "recommended" | "optional"
#              binary = "command_name"
#              install.brew = "formula_name"
#              install.apt = "package_name"
#              install.dnf = "package_name"
#              install.pacman = "package_name"
#              install.cargo = "crate_name"
#              install.nix = "nixpkgs.name"
#              min_version = "x.y.z"
# ============================================================================

# ============================================================================
# Essential Tools — Core functionality depends on these
# ============================================================================

[tools.eza]
description = "Modern replacement for ls with icons and git integration"
category = "essential"
binary = "eza"
min_version = "0.18"
install.brew = "eza"
install.apt = "eza"
install.dnf = "eza"
install.pacman = "eza"
install.cargo = "eza"
install.nix = "eza"

[tools.fzf]
description = "Command-line fuzzy finder"
category = "essential"
binary = "fzf"
min_version = "0.50"
install.brew = "fzf"
install.apt = "fzf"
install.dnf = "fzf"
install.pacman = "fzf"
install.nix = "fzf"

[tools.bat]
description = "Cat clone with syntax highlighting and git integration"
category = "essential"
binary = "bat"
min_version = "0.24"
install.brew = "bat"
install.apt = "bat"
install.dnf = "bat"
install.pacman = "bat"
install.cargo = "bat"
install.nix = "bat"

[tools.fd]
description = "Simple, fast, user-friendly alternative to find"
category = "essential"
binary = "fd"
min_version = "9.0"
install.brew = "fd"
install.apt = "fd-find"
install.dnf = "fd-find"
install.pacman = "fd"
install.cargo = "fd-find"
install.nix = "fd"

[tools.ripgrep]
description = "Recursively search directories for a regex pattern"
category = "essential"
binary = "rg"
min_version = "14.0"
install.brew = "ripgrep"
install.apt = "ripgrep"
install.dnf = "ripgrep"
install.pacman = "ripgrep"
install.cargo = "ripgrep"
install.nix = "ripgrep"

[tools.zoxide]
description = "Smarter cd command with learning and ranking"
category = "essential"
binary = "zoxide"
min_version = "0.9"
install.brew = "zoxide"
install.apt = "zoxide"
install.dnf = "zoxide"
install.pacman = "zoxide"
install.cargo = "zoxide"
install.nix = "zoxide"

[tools.git]
description = "Distributed version control system"
category = "essential"
binary = "git"
min_version = "2.40"
install.brew = "git"
install.apt = "git"
install.dnf = "git"
install.pacman = "git"
install.nix = "git"

[tools.delta]
description = "Syntax-highlighting pager for git, diff, and grep output"
category = "essential"
binary = "delta"
min_version = "0.16"
install.brew = "git-delta"
install.apt = "git-delta"
install.dnf = "git-delta"
install.pacman = "git-delta"
install.cargo = "git-delta"
install.nix = "delta"

[tools.starship]
description = "Minimal, blazing-fast, cross-shell prompt"
category = "essential"
binary = "starship"
min_version = "1.18"
install.brew = "starship"
install.apt = "starship"
install.pacman = "starship"
install.cargo = "starship"
install.nix = "starship"
install.script = "curl -sS https://starship.rs/install.sh | sh"

[tools.neovim]
description = "Hyper-extensible Vim-based text editor"
category = "essential"
binary = "nvim"
min_version = "0.10"
install.brew = "neovim"
install.apt = "neovim"
install.dnf = "neovim"
install.pacman = "neovim"
install.nix = "neovim"

# ============================================================================
# Recommended Tools — Strongly recommended for full experience
# ============================================================================

[tools.atuin]
description = "Magical shell history with sync and search"
category = "recommended"
binary = "atuin"
min_version = "18.0"
install.brew = "atuin"
install.pacman = "atuin"
install.cargo = "atuin"
install.nix = "atuin"
install.script = "curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh"

[tools.mise]
description = "Polyglot runtime version manager (replaces asdf, nvm, pyenv)"
category = "recommended"
binary = "mise"
min_version = "2024.10"
install.brew = "mise"
install.pacman = "mise"
install.cargo = "mise"
install.nix = "mise"
install.script = "curl https://mise.run | sh"

[tools.direnv]
description = "Unclutter your .profile with per-directory environments"
