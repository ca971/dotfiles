# ============================================================================
# @file        themes/starship-nerd.toml
# @description Nerd Blocks prompt — maximum information for server ops.
#              Used on: VPS, Proxmox hosts, Kubernetes nodes, CI/CD.
#              Shows: memory, IP, shell level, detailed git, full context.
# @repository  https://github.com/ca971/dotfiles.git
# @author      ca971
# @license     MIT
# @created     2025-07-15
# @version     1.0.0
# ============================================================================

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dcfe"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

format = """
$username\
$hostname\
$localip\
$shlvl\
$shell\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$kubernetes\
$nix_shell\
$package\
$fill\
$nodejs\
$python\
$rust\
$golang\
$java\
$terraform\
$nix_shell\
$memory_usage\
$cmd_duration\
$jobs\
$battery\
$time\
$status\
$line_break\
$character"""

right_format = ""
add_newline = true
continuation_prompt = "[󰁕 ](dimmed yellow)"

[character]
success_symbol = "[󰄬](bold green) "
error_symbol = "[󰅖](bold red) "
vimcmd_symbol = "[󰅪](bold mauve) "
vimcmd_replace_symbol = "[󰛔](bold peach) "
vimcmd_visual_symbol = "[󰈈](bold yellow) "

[shell]
disabled = false
format = "[$indicator]($style) "
style = "bold blue"
zsh_indicator = "󰰰 zsh"
bash_indicator = "󰰚 bash"
fish_indicator = "󰰭 fish"
nu_indicator = "󰰼 nu"
powershell_indicator = "󰰳 pwsh"

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold sky"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "bold yellow"
trim_at = "."

[localip]
ssh_only = true
format = "[󰩟 $localipv4]($style) "
style = "dimmed yellow"

[shlvl]
disabled = false
format = "[$symbol$shlvl]($style) "
symbol = "󰧈 "
style = "dimmed yellow"
threshold = 2

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold lavender"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "bold red"
home_symbol = " ~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Projects" = "󱗆 "
"Dev" = " "
".config" = " "
"dotfiles" = "󰒲 "
"src" = "󰘦 "

[git_branch]
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold green"
truncation_length = 30

[git_commit]
format = "[$symbol$hash$tag]($style) "
style = "bold green"
symbol = "󰜘 "
tag_symbol = " 🏷 "
only_detached = true

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

[git_metrics]
disabled = false
format = "([󰐕$added]($added_style) [󰍴$deleted]($deleted_style) )"
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold peach"
conflicted = "󰞇"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "󰹹"
untracked = "󰡿"
stashed = "󰀼"
modified = "󰏫"
staged = "󰐖"
renamed = "󰕈"
deleted = "󰛇"

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style = "bold blue"
only_with_files = true
detect_files = [
  "docker-compose.yml",
  "docker-compose.yaml",
  "compose.yml",
  "compose.yaml",
  "Dockerfile",
]

[kubernetes]
disabled = false
symbol = "☸ "
format = "[$symbol$context(:$namespace)]($style) "
style = "bold sapphire"

[nix_shell]
disabled = false
format = "[ ❄️ $state( $name)]($style) "
style = "bg:teal fg:base bold"
impure_msg = ""
pure_msg = "pure"
unknown_msg = ""

[package]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold peach"

[fill]
symbol = " "

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold green"

[python]
symbol = " "
format = "[$symbol$version( $virtualenv)]($style) "
style = "bold yellow"

[rust]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold maroon"

[golang]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold sky"

[java]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold red"

[terraform]
symbol = "󱁢 "
format = "[$symbol$version($workspace)]($style) "
style = "bold lavender"

[memory_usage]
disabled = false
threshold = 70
symbol = "󰍛 "
format = "[$symbol$ram_pct]($style) "
style = "bold dimmed red"

[cmd_duration]
min_time = 2000
symbol = "󱎫 "
format = "[$symbol$duration]($style) "
style = "bold yellow"

[jobs]
symbol = "󰔟 "
format = "[$symbol$number]($style) "
style = "bold blue"
threshold = 1

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 15
style = "bold red"

[[battery.display]]
threshold = 30
style = "bold yellow"

[time]
disabled = false
format = "[󱑎 $time]($style) "
style = "dimmed subtext0"
time_format = "%H:%M:%S"

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "󰅙 "
style = "bold red"
map_symbol = true

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold blue"

[os.symbols]
Alpaquita = " "
Alpine = " "
Amazon = " "
Android = " "
Arch = " "
Artix = " "
CentOS = " "
Debian = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Garuda = "󰛓 "
Gentoo = " "
Linux = " "
Macos = " "
Manjaro = " "
Mint = "󰣭 "
NixOS = " "
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
RockyLinux = " "
Ubuntu = " "
Unknown = " "
Void = " "
Windows = " "
