format = "[¾░®ƒ $localipv4]($style) "
style = "dimmed yellow"

[shlvl]
disabled = false
format = "[$symbol$shlvl]($style) "
symbol = "¾░ºê "
style = "dimmed yellow"
threshold = 2

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold lavender"
truncation_length = 4
truncation_symbol = "ÔÇª/"
truncate_to_repo = true
read_only = " ¾░î¥"
read_only_style = "bold red"
home_symbol = "´Çò ~"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "¾░çÜ "
"Projects" = "¾▒ùå "
"Dev" = "´äí "
".config" = "¯ÿò "
"dotfiles" = "¾░Æ▓ "
"src" = "¾░ÿª "

[git_branch]
symbol = "´Éÿ "
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold green"
truncation_length = 30

[git_commit]
format = "[ $hash$tag]($style) "
style = "bold green"
tag_symbol = " ­ƒÅÀ "
only_detached = true

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
