[git_metrics]
disabled = false
format = "([¾░Éò$added]($added_style) [¾░ì┤$deleted]($deleted_style) )"
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold peach"
# ignore_submodules = true # Ignore git submodules (fastest)
conflicted = "¾░×ç"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "¾░╣╣"
untracked = "¾░í┐"
stashed = "¾░Ç╝"
modified = "¾░Å½"
staged = "¾░Éû"
renamed = "¾░òê"
deleted = "¾░øç"

[docker_context]
symbol = "´êƒ "
format = "[$symbol$context]($style) "
style = "bold blue"
only_with_files = true
detect_files = [
  "docker-compose.yml",
  "docker-compose.yaml",
  "compose.yml",
  "compose.yaml",
  "Dockerfile",
]

[kubernetes]
disabled = false
symbol = "Ôÿ© "
format = "[$symbol$context(:$namespace)]($style) "
